spring:
  application:
    name: chef-control-api

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  error:
    include-message: never

app:
  jwt:
    expiration-ms: 86400000

  cookie:
    secure: ${COOKIE_SECURE:false}

  token:
    password-reset-expiration-minutes: 15
    set-password-expiration-hours: 48

  ai-service:
    timeout-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
