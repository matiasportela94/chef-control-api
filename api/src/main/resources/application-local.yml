spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ChefControlPool

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}

  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}

  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

  google:
    api-key: ${GOOGLE_AI_API_KEY:}
    model: ${GOOGLE_AI_MODEL:gemma-4}

  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8001}
    secret: ${AI_SERVICE_SECRET}

  whatsapp:
    verify-token: ${WHATSAPP_VERIFY_TOKEN}
    access-token: ${WHATSAPP_ACCESS_TOKEN}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID}

logging:
  level:
    com.chefcontrol: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
